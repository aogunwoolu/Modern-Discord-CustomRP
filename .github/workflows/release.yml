name: Build & Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore CustomRP.Modern/CustomRP.Modern.csproj

      - name: Publish (win-x64, single-file)
        run: |
          dotnet publish CustomRP.Modern/CustomRP.Modern.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:Version=${{ github.ref_name }} `
            -o publish/

      - name: Zip artifact
        run: |
          Compress-Archive `
            -Path publish/CustomRP.Modern.exe `
            -DestinationPath CustomRP.Modern-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CustomRP.Modern ${{ github.ref_name }}
          files: CustomRP.Modern-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
